name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build server
        run: go build -o bin/server ./cmd/server

      - name: Build SDK
        run: go build -o bin/seo-crawler ./cmd/seo-crawler

      - name: Run tests
        run: go test ./... -v -count=1 -race -coverprofile=coverage.out -covermode=atomic

      - name: Generate coverage report
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out

      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const output = execSync('go tool cover -func=coverage.out').toString();
            const totalLine = output.trim().split('\n').pop();
            const match = totalLine.match(/([\d.]+)%/);
            const coverage = match ? match[1] : 'unknown';

            const body = `## Test Coverage Report\n\n` +
              `**Total coverage: ${coverage}%**\n\n` +
              `<details><summary>Full coverage report</summary>\n\n` +
              `\`\`\`\n${output}\n\`\`\`\n</details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

  frontend:
    name: Frontend (Astro)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx astro check
        continue-on-error: true

      - name: Build
        run: npm run build
