name: Release SDK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build All Platforms
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build all platforms
        run: |
          mkdir -p dist

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            output="dist/seo-crawler-${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then output="${output}.exe"; fi

            echo "Building ${GOOS}/${GOARCH}..."
            GOOS=$GOOS GOARCH=$GOARCH go build \
              -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
              -o "$output" \
              ./cmd/seo-crawler
          done

          ls -la dist/

      - name: Upload unsigned Windows binary
        id: upload-unsigned-windows
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-windows-binary
          path: dist/seo-crawler-windows-amd64.exe

      - name: Upload all non-Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: non-windows-binaries
          path: |
            dist/seo-crawler-linux-amd64
            dist/seo-crawler-linux-arm64
            dist/seo-crawler-darwin-amd64
            dist/seo-crawler-darwin-arm64

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download non-Windows binaries
        uses: actions/download-artifact@v4
        with:
          name: non-windows-binaries
          path: dist

      - name: Download signed Windows binary
        uses: actions/download-artifact@v4
        with:
          name: signed-windows-binary
          path: dist

      - name: List release artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*

      - name: Update major version tag for Marketplace
        run: |
          MAJOR_VERSION=$(echo "${{ github.ref_name }}" | grep -oP '^v\d+')
          git tag -f "$MAJOR_VERSION"
          git push origin "$MAJOR_VERSION" --force
