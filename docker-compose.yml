services:
  app:
    build: .
    container_name: seo-crawler
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "4321:4321"
    volumes:
      - app-data:/app/data
    environment:
      - PORT=8080
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  app-data:
